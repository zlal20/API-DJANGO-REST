name: Trigger auto deployment for api-django-rest

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/api-django-rest-AutoDeployTrigger-8cec3ea9-9735-493a-b304-c4def9841e67.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.APIDJANGOREST_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.APIDJANGOREST_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.APIDJANGOREST_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.APIDJANGOREST_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.APIDJANGOREST_REGISTRY_PASSWORD }}
          containerAppName: api-django-rest
          resourceGroup: RG-Django
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


