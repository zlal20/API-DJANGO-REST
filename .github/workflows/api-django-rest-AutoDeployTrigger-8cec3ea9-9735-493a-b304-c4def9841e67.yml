name: Trigger auto deployment for api-django-rest

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.APIDJANGOREST_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.APIDJANGOREST_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.APIDJANGOREST_AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: ./Dockerfile
          registryUrl: djangoefranco2026.azurecr.io
          registryUsername: ${{ secrets.APIDJANGOREST_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.APIDJANGOREST_REGISTRY_PASSWORD }}
          containerAppName: api-django-rest
          resourceGroup: RG-Django
          imageToBuild: djangoefranco2026.azurecr.io/api-django-rest:${{ github.sha }}
